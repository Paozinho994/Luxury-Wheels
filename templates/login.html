{% extends "index.html" %} <!-- Substitua pelo nome do seu template base se for diferente -->

{% block content %}
<div class="container" style="margin-top: 80px; margin-bottom: 80px;">
    <!-- Cartão de Login Estilizado -->
    <div class="card search-card p-4 p-sm-5 mx-auto style-form shadow" style="max-width: 480px; border-radius: 12px; border: 1px solid #ced4da;">
        
        <!-- Cabeçalho do Formulário -->
        <div class="text-center mb-4">
            <div class="mb-2">
                <i class="bi bi-car-front-fill text-warning" style="font-size: 2.5rem;"></i>
            </div>
            <h2 class="fw-bold text-dark">Iniciar Sessão</h2>
            <p class="text-secondary small">Aceda à sua conta Premium Drive para gerir as suas reservas</p>
        </div>

        <!-- Formulário -->
        <form action="/login" method="POST">
            
            <!-- Campo: Email -->
            <div class="mb-3">
                <label class="form-label text-secondary fw-semibold small">
                    <i class="bi bi-envelope me-1"></i>Endereço de Email
                </label>
                <input type="email" name="email" class="form-control form-control-lg fs-6" style="height: 48px; border-radius: 8px;" placeholder="exemplo@email.com" required>
            </div>

            <!-- Campo: Password -->
            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label text-secondary fw-semibold small m-0">
                        <i class="bi bi-lock me-1"></i>Palavra-passe
                    </label>
                </div>
                <input type="password" name="password" class="form-control form-control-lg fs-6" style="height: 48px; border-radius: 8px;" placeholder="Introduza a sua password" required>
            </div>

            <!-- Botão de Submissão -->
            <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold py-2 shadow-sm text-dark mb-3" style="height: 48px; border-radius: 8px;">
                Entrar
            </button>
        </form>

        <!-- Link para Registo -->
        <div class="text-center mt-3 border-top pt-3">
            <p class="text-secondary small mb-0">
                Ainda não tem uma conta? <a href="/registo" class="text-dark fw-bold text-decoration-none" style="border-bottom: 2px solid #ba8b02;">Registe-se aqui</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
